<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海鹽奶油分帳 🌊 Butter Split</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Gaegu:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FBF4E8;
    --bg-deep: #F5EAD8;
    --card: #FFFDF8;
    --line: #F0E2CC;
    --butter: #F7DFA8;
    --butter-deep: #EFCB7B;
    --caramel: #D9A47C;
    --caramel-deep: #C68B5E;
    --cocoa: #5C4633;
    --mocha: #8C7359;
    --milk-tea: #B79B7F;
    --berry: #E08E8A;
    --berry-deep: #CE6F6B;
    --matcha: #A3B98C;
    --matcha-deep: #7E9A66;
    --radius: 22px;
    --shadow: 0 6px 24px rgba(140, 105, 60, .10);
    --shadow-sm: 0 3px 10px rgba(140, 105, 60, .08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(#F1E3C8 8%, transparent 9%);
    background-size: 34px 34px;
    color: var(--cocoa);
    min-height: 100vh;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 28px 18px 80px; }

  /* ── header ── */
  .hero {
    background: linear-gradient(135deg, #FFF6DF, #FCE9C3);
    border: 2px solid #F3DCAF;
    border-radius: 28px;
    padding: 26px 28px;
    box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 26px;
    position: relative; overflow: hidden;
  }
  .hero::after {
    content: "🌊"; position: absolute; right: 18px; bottom: -14px;
    font-size: 74px; opacity: .18; transform: rotate(-12deg);
  }
  .hero .logo {
    width: 62px; height: 62px; border-radius: 20px;
    background: var(--card); border: 2px solid #F3DCAF;
    display: grid; place-items: center; font-size: 32px;
    box-shadow: var(--shadow-sm); flex-shrink: 0;
  }
  .hero h1 { font-size: 26px; font-weight: 900; letter-spacing: 1px; }
  .hero h1 .en { font-family: 'Gaegu', cursive; color: var(--caramel-deep); font-size: 20px; margin-left: 6px; }
  .hero p { color: var(--mocha); font-size: 13.5px; margin-top: 4px; }

  /* ── card ── */
  .card {
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    padding: 22px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-size: 16px; font-weight: 700; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .card h2 .dot { font-size: 18px; }

  /* ── inputs ── */
  input[type="text"], input[type="number"], input[type="date"], select {
    font-family: inherit; font-size: 14.5px; color: var(--cocoa);
    background: #FFFDF6;
    border: 2px solid var(--line);
    border-radius: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--butter-deep); box-shadow: 0 0 0 4px rgba(239, 203, 123, .25); }
  input:disabled { background: var(--bg-deep); color: var(--milk-tea); }
  label.f {
    display: flex; flex-direction: column; gap: 6px;
    font-size: 12.5px; font-weight: 700; color: var(--mocha);
  }
  .frow { display: flex; gap: 12px; flex-wrap: wrap; }
  .frow > * { flex: 1; min-width: 130px; }

  /* ── buttons ── */
  .btn {
    font-family: inherit; font-size: 14.5px; font-weight: 700;
    border: none; border-radius: 999px; cursor: pointer;
    padding: 11px 22px;
    transition: transform .12s, filter .15s;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .btn:hover { filter: brightness(1.05); transform: translateY(-1px); }
  .btn:active { transform: translateY(1px) scale(.98); }
  .btn-primary { background: linear-gradient(135deg, var(--caramel), var(--caramel-deep)); color: #FFF9EE; box-shadow: 0 4px 12px rgba(198, 139, 94, .35); }
  .btn-butter  { background: linear-gradient(135deg, var(--butter), var(--butter-deep)); color: var(--cocoa); box-shadow: 0 4px 12px rgba(239, 203, 123, .35); }
  .btn-ghost   { background: transparent; color: var(--mocha); border: 2px solid var(--line); }
  .btn-danger  { background: linear-gradient(135deg, var(--berry), var(--berry-deep)); color: #FFF6F2; }
  .btn-sm { padding: 7px 14px; font-size: 13px; }
  .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

  /* ── plan cards ── */
  .plan-card {
    background: var(--card); border: 2px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow-sm);
    padding: 18px 20px; margin-bottom: 14px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: transform .15s, box-shadow .15s, border-color .15s;
  }
  .plan-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--butter-deep); }
  .plan-card .emoji {
    width: 52px; height: 52px; border-radius: 16px; flex-shrink: 0;
    background: var(--bg-deep); display: grid; place-items: center; font-size: 26px;
  }
  .plan-card .info { flex: 1; min-width: 0; }
  .plan-card .name { font-weight: 700; font-size: 16px; }
  .plan-card .meta { font-size: 12.5px; color: var(--milk-tea); margin-top: 3px; }
  .badge {
    font-size: 11.5px; font-weight: 700; padding: 4px 12px; border-radius: 999px; white-space: nowrap;
  }
  .badge-open   { background: #EBF2E2; color: var(--matcha-deep); border: 1.5px solid #CBDCB8; }
  .badge-closed { background: #F5E4E3; color: var(--berry-deep); border: 1.5px solid #E9C6C4; }

  /* ── member chips ── */
  .chips { display: flex; flex-wrap: wrap; gap: 9px; }
  .chip {
    background: #FDF3DE; border: 2px solid #F3DCAF;
    border-radius: 999px; padding: 7px 14px;
    font-size: 13.5px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .chip .x {
    cursor: pointer; color: var(--milk-tea); font-weight: 900; font-size: 15px;
    line-height: 1; padding: 0 2px; border-radius: 50%;
  }
  .chip .x:hover { color: var(--berry-deep); }

  /* ── participant pick ── */
  .pick { display: flex; flex-wrap: wrap; gap: 8px; }
  .pick label {
    cursor: pointer; user-select: none;
    border: 2px solid var(--line); border-radius: 999px;
    padding: 7px 14px; font-size: 13.5px; font-weight: 700; color: var(--mocha);
    background: #FFFDF6; transition: all .12s;
  }
  .pick input { display: none; }
  .pick label:has(input:checked) {
    background: linear-gradient(135deg, var(--butter), var(--butter-deep));
    border-color: var(--butter-deep); color: var(--cocoa);
  }
  .seg { display: inline-flex; background: var(--bg-deep); border-radius: 999px; padding: 4px; gap: 4px; }
  .seg label { cursor: pointer; padding: 7px 16px; border-radius: 999px; font-size: 13px; font-weight: 700; color: var(--mocha); }
  .seg input { display: none; }
  .seg label:has(input:checked) { background: var(--card); color: var(--cocoa); box-shadow: var(--shadow-sm); }

  /* ── expense list ── */
  .exp-wrap { border-bottom: 2px dashed var(--line); }
  .exp-wrap:last-child { border-bottom: none; }
  .exp {
    display: flex; align-items: center; gap: 13px;
    padding: 13px 6px; cursor: pointer;
    border-radius: 14px; transition: background .12s;
  }
  .exp:hover { background: #FDF8EC; }
  .exp .chev { color: var(--milk-tea); font-size: 11px; transition: transform .15s; flex-shrink: 0; }
  .exp-wrap.open .chev { transform: rotate(90deg); }
  .exp .icon {
    width: 42px; height: 42px; border-radius: 14px; flex-shrink: 0;
    background: var(--bg-deep); display: grid; place-items: center; font-size: 20px;
  }
  .exp .body { flex: 1; min-width: 0; }
  .exp .t { font-weight: 700; font-size: 14.5px; }
  .exp .s { font-size: 12px; color: var(--milk-tea); margin-top: 2px; }
  .exp .amt { text-align: right; }
  .exp .amt .a { font-weight: 900; font-size: 15px; color: var(--caramel-deep); }
  .exp .amt .c { font-size: 11px; color: var(--milk-tea); }
  .exp .edit, .exp .del { background: none; border: none; cursor: pointer; font-size: 15px; color: var(--milk-tea); padding: 6px; border-radius: 10px; }
  .exp .edit:hover { color: var(--caramel-deep); background: #FDF3DE; }
  .exp .del:hover { color: var(--berry-deep); background: #F9ECEB; }

  /* ── expense detail ── */
  .exp-detail {
    background: #FDF6E7; border: 2px solid #F5E6C8; border-radius: 16px;
    padding: 12px 16px; margin: 0 6px 14px 61px;
  }
  .exp-detail .d-payer {
    font-size: 13px; font-weight: 700; color: var(--caramel-deep);
    padding-bottom: 8px; margin-bottom: 8px; border-bottom: 2px dashed #F0DFBC;
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .exp-detail .d-payer .d-rate { margin-left: auto; font-size: 11.5px; font-weight: 400; color: var(--milk-tea); }
  .exp-detail .d-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; padding: 4px 0;
  }
  .exp-detail .d-row .d-nm { font-weight: 700; display: flex; align-items: center; gap: 6px; min-width: 0; }
  .exp-detail .payer-tag {
    font-size: 10.5px; font-weight: 700; color: var(--caramel-deep);
    background: #FBEBCB; border-radius: 999px; padding: 2px 8px; white-space: nowrap;
  }
  .exp-detail .d-row .d-amt { margin-left: auto; font-weight: 700; text-align: right; }
  .exp-detail .d-row .d-sub { font-size: 11px; color: var(--milk-tea); font-weight: 400; }
  @media (max-width: 540px) { .exp-detail { margin-left: 6px; } }

  /* ── balances ── */
  .bal { display: flex; align-items: center; gap: 12px; padding: 10px 4px; }
  .bal .nm { font-weight: 700; font-size: 14px; width: 90px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bal .bar-wrap { flex: 1; height: 14px; background: var(--bg-deep); border-radius: 999px; overflow: hidden; display: flex; }
  .bal .bar-half { flex: 1; position: relative; }
  .bal .bar { position: absolute; top: 0; height: 100%; border-radius: 999px; }
  .bal .v { min-width: 110px; text-align: right; font-weight: 900; font-size: 13.5px; flex-shrink: 0; white-space: nowrap; }
  .pos { color: var(--matcha-deep); }
  .neg { color: var(--berry-deep); }
  .zero { color: var(--milk-tea); }
  .bal .v-sub { font-size: 11px; color: var(--milk-tea); font-weight: 400; margin-top: 2px; }
  .cur-mini { width: auto; padding: 5px 10px; font-size: 12px; border-radius: 10px; font-weight: 700; color: var(--mocha); }

  /* ── settled payments ── */
  .settle .btn { margin-left: 8px; }
  .settle.done {
    background: #F3F1E9; border-color: #E3DECE; opacity: .85;
  }
  .settle.done .money { color: var(--mocha); text-decoration: line-through; margin-left: 0; }
  .settle.done .done-date { margin-left: auto; font-size: 11px; color: var(--milk-tea); font-weight: 400; }
  .settled-head {
    font-size: 12.5px; font-weight: 700; color: var(--matcha-deep);
    margin: 16px 0 10px; padding-top: 14px; border-top: 2px dashed var(--line);
  }

  /* ── settlement ── */
  .settle {
    display: flex; align-items: center; gap: 10px;
    background: #FDF3DE; border: 2px solid #F3DCAF; border-radius: 16px;
    padding: 12px 16px; margin-bottom: 10px; font-size: 14.5px; font-weight: 700;
    flex-wrap: wrap;
  }
  .settle .arrow { color: var(--caramel-deep); font-size: 17px; }
  .settle .money { margin-left: auto; color: var(--caramel-deep); font-weight: 900; }
  .allclear {
    text-align: center; padding: 26px 10px; color: var(--matcha-deep);
    font-weight: 700; font-size: 15px;
  }
  .allclear .big { font-size: 42px; display: block; margin-bottom: 8px; }

  .empty { text-align: center; color: var(--milk-tea); padding: 26px 10px; font-size: 14px; }
  .empty .big { font-size: 40px; display: block; margin-bottom: 8px; opacity: .8; }

  .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .topbar h1 { font-size: 22px; font-weight: 900; flex: 1; min-width: 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .closed-note {
    background: #F5E4E3; border: 2px solid #E9C6C4; color: var(--berry-deep);
    border-radius: 16px; padding: 12px 18px; font-size: 13.5px; font-weight: 700;
    margin-bottom: 20px; display: flex; align-items: center; gap: 9px;
  }

  .custom-splits { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .custom-splits .row { display: flex; align-items: center; gap: 10px; }
  .custom-splits .row .nm { width: 110px; font-size: 13.5px; font-weight: 700; flex-shrink: 0; }
  .hint { font-size: 12px; color: var(--milk-tea); margin-top: 6px; }
  .hint.bad { color: var(--berry-deep); font-weight: 700; }

  /* ── rates page ── */
  .rate-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0; border-bottom: 2px dashed var(--line);
  }
  .rate-row:last-of-type { border-bottom: none; }
  .rate-row .rate-cur { flex: 1; font-weight: 700; font-size: 14px; min-width: 0; }
  .rate-row .rate-eq { font-size: 12.5px; color: var(--mocha); white-space: nowrap; }
  .rate-row input { width: 140px; flex: none; text-align: right; }
  .rate-row .rate-anchor { font-size: 12.5px; font-weight: 700; color: var(--mocha); width: 40px; flex-shrink: 0; }
  .mini-link { color: var(--caramel-deep); cursor: pointer; text-decoration: underline; font-weight: 700; white-space: nowrap; }
  .mini-link:hover { color: var(--cocoa); }
  .meta-sub { margin-left: auto; font-size: 12px; color: var(--milk-tea); font-weight: 400; }

  /* ── toast ── */
  #toast {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px);
    background: var(--cocoa); color: #FFF7E8; padding: 12px 22px;
    border-radius: 999px; font-size: 14px; font-weight: 700;
    opacity: 0; pointer-events: none; transition: all .25s; z-index: 99;
    box-shadow: 0 8px 24px rgba(60,40,20,.25); max-width: 88vw;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── modal ── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(92, 70, 51, .35);
    display: none; place-items: center; z-index: 50; padding: 20px;
    backdrop-filter: blur(3px);
  }
  .modal-bg.show { display: grid; }
  .modal {
    background: var(--card); border-radius: 26px; padding: 28px;
    max-width: 380px; width: 100%; text-align: center;
    box-shadow: 0 20px 60px rgba(60,40,20,.25);
    border: 2px solid var(--line);
  }
  .modal .m-emoji { font-size: 46px; margin-bottom: 10px; }
  .modal h3 { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
  .modal p { font-size: 13.5px; color: var(--mocha); line-height: 1.6; margin-bottom: 20px; }
  .modal .m-btns { display: flex; gap: 10px; justify-content: center; }

  .footer { text-align: center; color: var(--milk-tea); font-size: 12px; margin-top: 34px; }
  .footer .heart { color: var(--berry); }

  .sync-badge {
    font-size: 11.5px; font-weight: 700; padding: 4px 10px; border-radius: 999px;
    background: #EBF2E2; color: var(--matcha-deep); white-space: nowrap;
  }
  .sync-badge.busy { background: #FDF3DE; color: var(--caramel-deep); }
  .sync-badge.err { background: #F5E4E3; color: var(--berry-deep); }
  .cloud-setup { background: #FDF8EC; border-color: #F3DCAF; }
  .cloud-setup .ok-line { font-size: 13px; color: var(--matcha-deep); font-weight: 700; margin-top: 10px; }

  @media (max-width: 540px) {
    .bal .nm { width: 64px; }
    .bal .v { min-width: 88px; }
  }


/* =========================================================
   Butter Split v2｜海鹽奶油風 Sea Salt Butter Edition
   只改外觀，保留原本 Google Sheets、分享、匯率與編輯功能
   ========================================================= */
:root {
  --bg: #F4FBFE;
  --bg-deep: #E8F5FA;
  --card: rgba(255, 255, 255, .82);
  --line: #D4EAF2;
  --butter: #FFF0C9;
  --butter-deep: #F2DDA4;
  --caramel: #9AD8EC;
  --caramel-deep: #68BBD9;
  --cocoa: #505A67;
  --mocha: #74838F;
  --milk-tea: #A0ADB6;
  --berry: #F0BFD2;
  --berry-deep: #D58EAB;
  --matcha: #BDDCC9;
  --matcha-deep: #6F9C83;
  --radius: 25px;
  --shadow: 0 12px 36px rgba(84, 151, 179, .13);
  --shadow-sm: 0 6px 20px rgba(84, 151, 179, .09);
}

html { scroll-behavior: smooth; }

body {
  color: var(--cocoa);
  background:
    radial-gradient(circle at 10% 8%, rgba(156, 214, 243, .88), transparent 34%),
    radial-gradient(circle at 88% 16%, rgba(246, 186, 221, .82), transparent 33%),
    radial-gradient(circle at 20% 86%, rgba(183, 214, 245, .72), transparent 36%),
    radial-gradient(circle at 90% 84%, rgba(229, 198, 243, .70), transparent 34%),
    linear-gradient(150deg,#D9EEF9 0%,#E8F1FB 38%,#F4DCEB 72%,#F6EDF9 100%);
  background-attachment: fixed;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

body::before,
body::after {
  content: "";
  position: fixed;
  z-index: -1;
  pointer-events: none;
  opacity: .75;
}

body::before {
  width: 410px;
  height: 410px;
  left: -195px;
  top: 12%;
  border-radius: 45% 55% 61% 39% / 55% 43% 57% 45%;
  background: linear-gradient(145deg,
    rgba(174, 222, 241, .44),
    rgba(255,255,255,.12),
    rgba(244, 197, 217, .32));
  filter: blur(3px);
  transform: rotate(-15deg);
}

body::after {
  width: 470px;
  height: 260px;
  right: -210px;
  bottom: 4%;
  border-radius: 56% 44% 48% 52% / 65% 50% 50% 35%;
  background: linear-gradient(155deg,
    rgba(245, 206, 222, .34),
    rgba(255, 236, 193, .28),
    rgba(176, 222, 240, .38));
  filter: blur(3px);
  transform: rotate(10deg);
}

.wrap {
  max-width: 790px;
  padding: 30px 18px 86px;
}

/* 首頁海岸主視覺 */
.hero {
  min-height: 178px;
  padding: 30px 30px;
  border: 2px solid rgba(255,255,255,.88);
  border-radius: 31px;
  background:
    radial-gradient(circle at 75% 73%, rgba(246, 208, 224, .72), transparent 29%),
    radial-gradient(circle at 23% 15%, rgba(255,255,255,.90), transparent 30%),
    linear-gradient(150deg, #BEE6F5 0%, #E7F7FC 45%, #F7D8E5 100%);
  box-shadow:
    0 16px 42px rgba(74, 145, 175, .17),
    inset 0 1px 0 rgba(255,255,255,.92);
  isolation: isolate;
}

.hero::before {
  content: "";
  position: absolute;
  z-index: -1;
  left: -8%;
  right: -8%;
  bottom: -44px;
  height: 120px;
  border-radius: 50%;
  background:
    radial-gradient(ellipse at 50% 0%,
      rgba(255,255,255,.96) 0 14%,
      rgba(255,255,255,.46) 15% 24%,
      transparent 25%),
    linear-gradient(to bottom, rgba(255,255,255,.13), rgba(255,255,255,.68));
  opacity: .78;
  transform: rotate(-3deg);
}

.hero::after {
  content: "🐚";
  right: 20px;
  bottom: 1px;
  font-size: 78px;
  opacity: .20;
  transform: rotate(-13deg);
}

.hero .logo {
  width: 70px;
  height: 70px;
  border-radius: 23px;
  background: rgba(255,255,255,.78);
  border: 2px solid rgba(255,255,255,.94);
  box-shadow:
    0 9px 24px rgba(83, 150, 178, .14),
    inset 0 1px 0 #fff;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.hero h1 {
  color: #4F5966;
  text-shadow: 0 1px 0 rgba(255,255,255,.9);
}

.hero h1 .en {
  color: #D28BA8;
}

.hero p {
  color: #687986;
  line-height: 1.8;
}

/* 玻璃卡片 */
.card {
  background: rgba(255,255,255,.78);
  border: 1.8px solid rgba(211, 234, 243, .96);
  border-radius: var(--radius);
  box-shadow:
    0 10px 30px rgba(78, 146, 174, .10),
    inset 0 1px 0 rgba(255,255,255,.94);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

.card h2 { color: #535E6A; }

.card h2 .dot {
  min-width: 35px;
  height: 35px;
  padding: 0 7px;
  border-radius: 12px;
  display: inline-grid;
  place-items: center;
  background: linear-gradient(145deg, #E9F7FC, #FFF0F5);

<script>
'use strict';

/* ───────────────────────── state ───────────────────────── */
const LS_KEY = 'butter-split-v1';
// ← 部署 Apps Script 後，把「網頁應用程式」URL 貼在這裡（朋友不用設定，開分享連結即可）
const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbw6AGjVi2fny0-LnhmfYqYT2u-Kqdxv0YKcMIOcfOvSEcsfZ_hsn5VwmCskQwsDzSq2xw/exec';
const POLL_PLAN_MS = 4000;
const POLL_HOME_MS = 6000;
const CURRENCIES = [
  ['TWD','🇹🇼 台幣 TWD'], ['JPY','🇯🇵 日圓 JPY'], ['KRW','🇰🇷 韓元 KRW'],
  ['USD','🇺🇸 美金 USD'], ['EUR','🇪🇺 歐元 EUR'], ['CNY','🇨🇳 人民幣 CNY'],
  ['HKD','🇭🇰 港幣 HKD'], ['SGD','🇸🇬 新幣 SGD'], ['THB','🇹🇭 泰銖 THB'],
  ['VND','🇻🇳 越南盾 VND'], ['GBP','🇬🇧 英鎊 GBP'], ['AUD','🇦🇺 澳幣 AUD'],
];
const PLAN_EMOJIS = ['🏝️','🐋','🐠','🪸','🪼','⛵','🌅','🦀','🐙','⭐'];

const LEGACY_PLAN_ICON_MAP = {
  '🍪':'🏝️', '🍰':'🐋', '🧇':'⛵', '🍮':'🪸', '🥐':'🌅',
  '🧁':'🪼', '🥞':'🐙', '🍩':'🦀', '🍞':'🏝️', '🫖':'⭐',
  '🍯':'🐋', '🧈':'🌊', '🐻':'🐋', '🧸':'🐋'
};

function normalizePlanIcon(icon, planId = '') {
  if (LEGACY_PLAN_ICON_MAP[icon]) return LEGACY_PLAN_ICON_MAP[icon];
  if (PLAN_EMOJIS.includes(icon)) return icon;
  // 舊資料沒有圖示或是未知圖示時，用 planId 穩定選一個，不會每次重整改變。
  const seed = String(planId || 'sea').split('').reduce((sum, ch) => sum + ch.charCodeAt(0), 0);
  return PLAN_EMOJIS[seed % PLAN_EMOJIS.length];
}

function migratePlanIcons(plans = []) {
  let changed = false;
  for (const plan of plans) {
    const next = normalizePlanIcon(plan.emoji, plan.id);
    if (plan.emoji !== next) {
      plan.emoji = next;
      changed = true;
    }
  }
  return changed;
}

let state = load();
let route = { view: 'home' };            // {view:'home'} | {view:'plan', id}
let expForm = null;                      // transient add/edit-expense form state
let editingExpenseId = null;              // expense currently being edited
let expandedExps = new Set();            // ids of expenses with detail open
let cloudSyncTimer = null;
let pollTimer = null;
let cloudSyncing = false;

function load() {
  let s;
  try { s = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { s = {}; }
  s.plans = s.plans || [];
  migratePlanIcons(s.plans);
  // global exchange rates, shared by every plan: 1 unit of currency = values[code] units of anchor
  s.rates = s.rates || { anchor: 'TWD', updatedAt: null, source: null, values: { TWD: 1 } };
  return s;
}

function cloudEnabled() { return !!SHEETS_API_URL; }

function save(opts = {}) {
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  if (!cloudEnabled()) return;
  if (cloudSyncTimer) clearTimeout(cloudSyncTimer);
  cloudSyncTimer = setTimeout(() => cloudFlush(opts), 400);
}

async function cloudFlush(opts) {
  if (!cloudEnabled() || cloudSyncing) return;
  cloudSyncing = true;
  setSyncBadge('busy', '同步中…');
  try {
    if (opts.deletePlanId) await apiPost({ action: 'deletePlan', id: opts.deletePlanId });
    if (opts.rates) await apiPost({ action: 'saveRates', rates: state.rates });
    const planId = opts.planId || (route.view === 'plan' ? route.id : null);
    if (planId && !opts.deletePlanId) {
      const p = getPlan(planId);
      if (p) {
        p.updatedAt = new Date().toISOString();
        await apiPost({ action: 'savePlan', plan: p });
      }
    }
    setSyncBadge('ok', '已同步 ☁️');
  } catch (e) {
    setSyncBadge('err', '同步失敗');
    console.error(e);
  } finally {
    cloudSyncing = false;
  }
}

async function apiGet(params) {
  const q = new URLSearchParams({ ...params, _t: Date.now() });
  const res = await fetch(`${SHEETS_API_URL}?${q}`);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'api error');
  return data;
}

async function apiPost(body) {
  const res = await fetch(SHEETS_API_URL, {
    method: 'POST',
    body: JSON.stringify(body),
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'api error');
  return data;
}

function setSyncBadge(kind, text) {
  const el = document.getElementById('syncBadge');
  if (!el) return;
  el.className = 'sync-badge' + (kind === 'busy' ? ' busy' : kind === 'err' ? ' err' : '');
  el.textContent = text;
}

function isEditingForm() {
  const el = document.activeElement;
  if (!el?.closest) return false;
  return !!el.closest('#expDesc, #expAmount, #expRate, #newMemberName, [data-custom], #newPlanName');
}

function planShareUrl(planId) {
  const u = new URL(location.href);
  u.searchParams.set('plan', planId);
  return u.toString();
}

async function cloudBootstrap() {
  const [{ rates }, { plans: metas }] = await Promise.all([
    apiGet({ action: 'rates' }),
    apiGet({ action: 'list' }),
  ]);
  if (rates) state.rates = rates;
  state.plans = [];
  for (const m of metas) {
    const { plan } = await apiGet({ action: 'plan', id: m.id });
    if (plan) state.plans.push(plan);
  }

  const iconDataChanged = migratePlanIcons(state.plans);
  localStorage.setItem(LS_KEY, JSON.stringify(state));

  // 把 Google 試算表中的舊甜點／小熊封面也一次改成海洋圖示。
  if (iconDataChanged) {
    for (const plan of state.plans) {
      await apiPost({ action: 'savePlan', plan });
    }
  }
}

async function pollCloud() {
  if (!cloudEnabled() || cloudSyncing) return;
  try {
    if (route.view === 'plan' && route.id) await pollPlan(route.id);
    else if (route.view === 'home') await pollHome();
    else if (route.view === 'rates') await pollRates();
  } catch (e) { console.warn('poll', e); }
}

async function pollPlan(id) {
  const { plan } = await apiGet({ action: 'plan', id });
  if (!plan) return;
  plan.emoji = normalizePlanIcon(plan.emoji, plan.id);
  const local = getPlan(id);
  if (local && (plan.updatedAt || '') <= (local.updatedAt || '')) return;
  const idx = state.plans.findIndex(p => p.id === id);
  if (idx >= 0) state.plans[idx] = plan;
  else state.plans.unshift(plan);
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  if (isEditingForm()) return;
  render();
  setSyncBadge('ok', '已更新 🔄');
}

async function pollHome() {
  const { plans: metas } = await apiGet({ action: 'list' });
  let changed = false;
  for (const m of metas) {
    const local = getPlan(m.id);
    if (local && (m.updatedAt || '') <= (local.updatedAt || '')) continue;
    const { plan } = await apiGet({ action: 'plan', id: m.id });
    if (!plan) continue;
    plan.emoji = normalizePlanIcon(plan.emoji, plan.id);
    const idx = state.plans.findIndex(p => p.id === plan.id);
    if (idx >= 0) state.plans[idx] = plan;
    else state.plans.unshift(plan);
    changed = true;
  }
  if (changed) {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    render();
  }
}

async function pollRates() {
  const { rates } = await apiGet({ action: 'rates' });
  if (!rates) return;
  const localAt = state.rates.updatedAt || '';
  const remoteAt = rates.updatedAt || '';
  if (remoteAt && remoteAt <= localAt) return;
  state.rates = rates;
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  if (isEditingForm()) return;
  render();
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  if (!cloudEnabled()) return;
  const ms = route.view === 'plan' ? POLL_PLAN_MS : POLL_HOME_MS;
  pollTimer = setInterval(pollCloud, ms);
}

async function init() {
  const urlPlan = new URLSearchParams(location.search).get('plan');
  if (cloudEnabled()) {
    setSyncBadge('busy', '載入中…');
    try {
      await cloudBootstrap();
      if (urlPlan) {
        let p = getPlan(urlPlan);
        if (!p) {
          const { plan } = await apiGet({ action: 'plan', id: urlPlan });
          if (plan) { state.plans.unshift(plan); p = plan; localStorage.setItem(LS_KEY, JSON.stringify(state)); }
        }
        if (p) route = { view: 'plan', id: urlPlan };
        else toast('找不到這個計劃連結');
      }
      setSyncBadge('ok', '已連線 ☁️');
    } catch (e) {
      setSyncBadge('err', '雲端載入失敗');
      toast('雲端載入失敗，先用本機資料');
      if (urlPlan && getPlan(urlPlan)) route = { view: 'plan', id: urlPlan };
    }
    startPolling();
  } else if (urlPlan && getPlan(urlPlan)) {
    route = { view: 'plan', id: urlPlan };
  }
  render();
}
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const today = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = n => n.toLocaleString('zh-TW', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
const fmtRate = v => String(Number(Number(v).toPrecision(6)));
const nowStr = () => new Date().toLocaleString('zh-TW', { hour12: false });
const getPlan = id => state.plans.find(p => p.id === id);

// cross rate from the maintained table: 1 `from` = ? `to` (null when either side is unset)
function getGlobalRate(from, to) {
  const v = state.rates.values;
  if (v[from] > 0 && v[to] > 0) return v[from] / v[to];
  return null;
}

// external rate provider — swap this function to change the data source
async function fetchExternalRates(anchor) {
  const res = await fetch(`https://open.er-api.com/v6/latest/${anchor}`);
  const data = await res.json();
  if (data.result !== 'success') throw new Error('provider error');
  const values = { [anchor]: 1 };
  for (const [code] of CURRENCIES) {
    if (code !== anchor && data.rates[code] > 0) values[code] = 1 / data.rates[code];
  }
  return { values, source: '🌐 open.er-api.com' };
}

/* ───────────────────────── toast & modal ───────────────────────── */
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}
function confirmBox({ emoji='', title, body, okText='確定', danger=true }, onOk) {
  const bg = document.getElementById('modalBg');
  document.getElementById('mEmoji').textContent = emoji;
  document.getElementById('mTitle').textContent = title;
  document.getElementById('mBody').textContent = body;
  const ok = document.getElementById('mOk');
  ok.textContent = okText;
  ok.className = danger ? 'btn btn-danger' : 'btn btn-primary';
  bg.classList.add('show');
  ok.onclick = () => { bg.classList.remove('show'); onOk(); };
  document.getElementById('mCancel').onclick = () => bg.classList.remove('show');
  bg.onclick = e => { if (e.target === bg) bg.classList.remove('show'); };
}

/* ───────────────────────── money math ───────────────────────── */
const toBase = (amount, rate) => amount * rate;

// per-member share of one expense, in the plan's base currency
function expenseShares(exp) {
  const shares = {};
  const base = toBase(exp.amount, exp.rate);
  if (exp.splitType === 'custom') {
    for (const pid of exp.participants) shares[pid] = toBase(exp.customAmounts[pid] || 0, exp.rate);
  } else {
    const each = base / exp.participants.length;
    for (const pid of exp.participants) shares[pid] = each;
  }
  return shares;
}

// net balance per member (+ = should receive, − = owes), in base currency
function balances(plan) {
  const bal = {};
  for (const m of plan.members) bal[m.id] = 0;
  for (const exp of plan.expenses) {
    const base = toBase(exp.amount, exp.rate);
    if (bal[exp.payerId] !== undefined) bal[exp.payerId] += base;
    const shares = expenseShares(exp);
    for (const [pid, s] of Object.entries(shares)) if (bal[pid] !== undefined) bal[pid] -= s;
  }
  // repayments that were marked as settled
  for (const sp of (plan.settledPayments || [])) {
    if (bal[sp.from] !== undefined) bal[sp.from] += sp.amount;
    if (bal[sp.to] !== undefined) bal[sp.to] -= sp.amount;
  }
  return bal;
}

// Splitwise-style debt simplification: greedy match biggest debtor ↔ biggest creditor
function settlements(plan) {
  const bal = balances(plan);
  const creditors = [], debtors = [];
  for (const [id, v] of Object.entries(bal)) {
    const r = Math.round(v * 100) / 100;
    if (r > 0.005) creditors.push({ id, v: r });
    else if (r < -0.005) debtors.push({ id, v: -r });
  }
  creditors.sort((a, b) => b.v - a.v);
  debtors.sort((a, b) => b.v - a.v);
  const out = [];
  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const pay = Math.min(debtors[i].v, creditors[j].v);
    out.push({ from: debtors[i].id, to: creditors[j].id, amount: Math.round(pay * 100) / 100 });
    debtors[i].v -= pay; creditors[j].v -= pay;
    if (debtors[i].v < 0.005) i++;
    if (creditors[j].v < 0.005) j++;
  }
  return out;
}

const planTotal = plan => plan.expenses.reduce((s, e) => s + toBase(e.amount, e.rate), 0);
const memberName = (plan, id) => (plan.members.find(m => m.id === id) || { name: '？' }).name;

/* ───────────────────────── actions ───────────────────────── */
function addPlan() {
  const name = document.getElementById('newPlanName').value.trim();
  const cur = document.getElementById('newPlanCur').value;
  if (!name) return toast('先幫計劃取個名字吧 🏝️');
  state.plans.unshift({
    id: uid(), name, baseCurrency: cur, closed: false,
    emoji: PLAN_EMOJIS[Math.floor(Math.random() * PLAN_EMOJIS.length)],
    createdAt: today(),
    members: [], expenses: [],
    updatedAt: new Date().toISOString(),
  });
  save({ planId: state.plans[0].id }); render();
  toast(`計劃「${name}」建立好囉 🎉`);
}

function deletePlan(id) {
  const p = getPlan(id);
  confirmBox({
    emoji: '🗑️', title: `刪除「${p.name}」？`,
    body: '計劃裡的成員與帳目會一起消失，這個動作無法復原喔。', okText: '刪除',
  }, () => {
    state.plans = state.plans.filter(x => x.id !== id);
    save({ deletePlanId: id });
    if (route.view === 'plan' && route.id === id) route = { view: 'home' };
    render();
    toast('計劃已刪除');
  });
}

function closePlan(id) {
  const p = getPlan(id);
  confirmBox({
    emoji: '🌙', title: `結案「${p.name}」？`,
    body: '結案後就不能再新增或修改任何帳目，只能查看結算結果。確定大家都對完帳了嗎？',
    okText: '結案！', danger: false,
  }, () => {
    p.closed = true; p.closedAt = today();
    save({ planId: id }); render();
    toast('計劃已結案，辛苦大家了 🎊');
  });
}

function addMember(planId) {
  const p = getPlan(planId);
  if (p.closed) return;
  const input = document.getElementById('newMemberName');
  const name = input.value.trim();
  if (!name) return toast('輸入成員的名字吧 ☁️');
  if (p.members.some(m => m.name === name)) return toast('已經有同名的成員囉');
  const member = { id: uid(), name };
  p.members.push(member);
  if (expForm) {
    expForm.participants.push(member.id);
    if (!expForm.payerId) expForm.payerId = member.id;
  }
  save({ planId }); render();
  const again = document.getElementById('newMemberName');
  if (again) again.focus();
}

function removeMember(planId, mid) {
  const p = getPlan(planId);
  if (p.closed) return;
  const used = p.expenses.some(e => e.payerId === mid || e.participants.includes(mid));
  if (used) return toast('這位成員已經有帳目紀錄，不能移除囉');
  p.members = p.members.filter(m => m.id !== mid);
  if (expForm) {
    expForm.participants = expForm.participants.filter(id => id !== mid);
    if (expForm.payerId === mid) expForm.payerId = p.members[0]?.id || '';
    delete expForm.customAmounts[mid];
  }
  save({ planId }); render();
}

function deleteExpense(planId, eid) {
  const p = getPlan(planId);
  if (p.closed) return;
  const e = p.expenses.find(x => x.id === eid);
  confirmBox({
    emoji: '🦀', title: `刪除「${e.desc}」？`, body: '這筆帳會從結算中移除。', okText: '刪除',
  }, () => {
    p.expenses = p.expenses.filter(x => x.id !== eid);
    if (editingExpenseId === eid) {
      editingExpenseId = null;
      expForm = blankExpForm(p);
    }
    save({ planId }); render();
  });
}

function editExpense(planId, eid) {
  const p = getPlan(planId);
  if (p.closed) return;
  const e = p.expenses.find(x => x.id === eid);
  if (!e) return toast('找不到這筆帳目');
  editingExpenseId = eid;
  expForm = {
    desc: e.desc || '',
    amount: String(e.amount ?? ''),
    currency: e.currency || p.baseCurrency,
    rate: String(e.rate ?? 1),
    payerId: e.payerId || p.members[0]?.id || '',
    splitType: e.splitType || 'equal',
    participants: [...(e.participants || [])],
    customAmounts: { ...(e.customAmounts || {}) },
    date: e.date || today(),
  };
  render();
  requestAnimationFrame(() => {
    document.getElementById('expDesc')?.focus();
    document.getElementById('expenseFormCard')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
  toast(`正在編輯「${e.desc}」🪸`);
}

function cancelEditExpense(planId) {
  const p = getPlan(planId);
  editingExpenseId = null;
  expForm = blankExpForm(p);
  render();
  toast('已取消編輯');
}

function markSettled(planId, from, to, amount) {
  const p = getPlan(planId);
  p.settledPayments = p.settledPayments || [];
  p.settledPayments.unshift({ id: uid(), from, to, amount, date: today() });
  save({ planId }); render();
  toast(`已記錄：${memberName(p, from)} 還給 ${memberName(p, to)} ${fmt(amount)} ${p.baseCurrency} ✓`);
}

function undoSettled(planId, spId) {
  const p = getPlan(planId);
  p.settledPayments = (p.settledPayments || []).filter(x => x.id !== spId);
  save({ planId }); render();
  toast('已取消這筆結清紀錄');
}

function blankExpForm(plan) {
  return {
    desc: '', amount: '', currency: plan.baseCurrency, rate: '1',
    payerId: plan.members[0]?.id || '', splitType: 'equal',
    participants: plan.members.map(m => m.id),
    customAmounts: {},
    date: today(),
  };
}

function submitExpense(planId) {
  const p = getPlan(planId);
  if (p.closed) return;
  const f = expForm;
  const amount = parseFloat(f.amount);
  const rate = parseFloat(f.rate);
  if (!f.desc.trim()) return toast('這筆錢花在哪裡呢？寫個名目吧 🪸');
  if (!(amount > 0)) return toast('金額要大於 0 喔');
  if (!(rate > 0)) return toast('匯率要大於 0 喔');
  if (!f.payerId) return toast('要選一位付款人');
  if (f.participants.length === 0) return toast('至少要選一位分帳成員');
  if (f.splitType === 'custom') {
    const sum = f.participants.reduce((s, id) => s + (parseFloat(f.customAmounts[id]) || 0), 0);
    if (Math.abs(sum - amount) > 0.01) {
      return toast(`自訂金額加總是 ${fmt(sum)}，跟總金額 ${fmt(amount)} 對不起來喔`);
    }
  }
  const expenseData = {
    desc: f.desc.trim(), amount, currency: f.currency, rate,
    payerId: f.payerId, splitType: f.splitType,
    participants: [...f.participants],
    customAmounts: f.splitType === 'custom'
      ? Object.fromEntries(f.participants.map(id => [id, parseFloat(f.customAmounts[id]) || 0]))
      : {},
    date: f.date || today(),
  };

  if (editingExpenseId) {
    const index = p.expenses.findIndex(e => e.id === editingExpenseId);
    if (index < 0) return toast('找不到要修改的帳目');
    p.expenses[index] = { ...p.expenses[index], ...expenseData };
    editingExpenseId = null;
    expForm = blankExpForm(p);
    save({ planId }); render();
    toast('帳目已更新 ✨');
  } else {
    p.expenses.unshift({ id: uid(), ...expenseData });
    expForm = blankExpForm(p);
    save({ planId }); render();
    toast('記好這一筆了 🦀');
  }
}

function planView(p) {
  if (!p) { route = { view: 'home' }; return homeView(); }
  if (!expForm) expForm = blankExpForm(p);
  const locked = p.closed;

  /* members */
  const chips = p.members.map(m => `
    <span class="chip">🐬 ${esc(m.name)}${locked ? '' : `<span class="x" data-delmember="${m.id}" title="移除成員">×</span>`}</span>
  `).join('');

  /* expense form */
  const isBase = expForm.currency === p.baseCurrency;
  const formHtml = locked ? '' : `
  <div class="card" id="expenseFormCard">
    <h2><span class="dot">${editingExpenseId ? '🪸' : '🦀'}</span>${editingExpenseId ? '編輯帳目' : '記一筆'}</h2>
    ${p.members.length === 0 ? `<div class="empty"><span class="big">🐬</span>先在上面新增成員，才能開始記帳喔</div>` : `
    <div class="frow">
      <label class="f" style="flex:2">名目
        <input type="text" id="expDesc" placeholder="例：燒肉晚餐、飯店住宿…" value="${esc(expForm.desc)}" maxlength="40">
      </label>
      <label class="f">金額
        <input type="number" id="expAmount" placeholder="0" min="0" step="any" value="${esc(expForm.amount)}">
      </label>
    </div>
    <div class="frow" style="margin-top:12px">
      <label class="f">幣別
        <select id="expCur">${CURRENCIES.map(([c, l]) => `<option value="${c}" ${c===expForm.currency?'selected':''}>${l}</option>`).join('')}</select>
      </label>
      <label class="f">匯率（1 ${expForm.currency} = ? ${p.baseCurrency}）
        <input type="number" id="expRate" min="0" step="any" value="${isBase ? '1' : esc(expForm.rate)}" ${isBase ? 'disabled' : ''}>
      </label>
      <label class="f">誰付的錢
        <select id="expPayer">${p.members.map(m => `<option value="${m.id}" ${m.id===expForm.payerId?'selected':''}>${esc(m.name)}</option>`).join('')}</select>
      </label>
      <label class="f">日期
        <input type="date" id="expDate" value="${esc(expForm.date || today())}">
      </label>
    </div>
    ${isBase ? '' : `<div class="hint" id="rateHint"><span id="rateHintText">${rateHintText(p)}</span> <span class="mini-link" id="goRatesFromPlan">⚓ 維護匯率</span></div>`}
    <div style="margin-top:14px">
      <div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:10px">
        <span style="font-size:12.5px; font-weight:700; color:var(--mocha)">分給誰</span>
        <div class="seg">
          <label><input type="radio" name="splitType" value="equal" ${expForm.splitType==='equal'?'checked':''}>均分</label>
          <label><input type="radio" name="splitType" value="custom" ${expForm.splitType==='custom'?'checked':''}>自訂金額</label>
        </div>
        <button class="btn btn-ghost btn-sm" id="btnPickAll" type="button">全選</button>
      </div>
      <div class="pick">
        ${p.members.map(m => `<label><input type="checkbox" data-part="${m.id}" ${expForm.participants.includes(m.id)?'checked':''}>${esc(m.name)}</label>`).join('')}
      </div>
      ${expForm.splitType === 'custom' ? `
      <div class="custom-splits">
        ${expForm.participants.map(id => `
        <div class="row">
          <span class="nm">${esc(memberName(p, id))}</span>
          <input type="number" data-custom="${id}" min="0" step="any" placeholder="0" value="${esc(expForm.customAmounts[id] ?? '')}">
        </div>`).join('')}
        ${customSumHint(p)}
      </div>` : ''}
    </div>
    <div style="margin-top:16px; display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap">
      ${editingExpenseId ? '<button class="btn btn-ghost" id="btnCancelEdit">取消編輯</button>' : ''}
      <button class="btn btn-butter" id="btnAddExp">${editingExpenseId ? '💾 儲存修改' : '＋ 加入這筆帳'}</button>
    </div>`}
  </div>`;

  /* expense list */
  const expList = p.expenses.map(e => {
    const base = toBase(e.amount, e.rate);
    const isB = e.currency === p.baseCurrency;
    const open = expandedExps.has(e.id);
    const shares = expenseShares(e);
    const detail = !open ? '' : `
      <div class="exp-detail">
        <div class="d-payer">💎 ${esc(memberName(p, e.payerId))} 先付了 ${fmt(e.amount)} ${e.currency}
          ${isB ? '' : `<span class="d-rate">匯率 1 ${e.currency} = ${e.rate} ${p.baseCurrency}</span>`}
        </div>

          const orig = e.splitType === 'custom' ? (e.customAmounts[pid] || 0) : e.amount / e.participants.length;
          return `
          <div class="d-row">
            <span class="d-nm">${esc(memberName(p, pid))}${pid === e.payerId ? '<span class="payer-tag">💎 付款人</span>' : ''}</span>
            <span class="d-amt">分擔 ${fmt(orig)} ${e.currency}${isB ? '' : ` <span class="d-sub">≈ ${fmt(shares[pid])} ${p.baseCurrency}</span>`}</span>
          </div>`;
        }).join('')}
      </div>`;
    return `
    <div class="exp-wrap ${open ? 'open' : ''}">
      <div class="exp" data-togexp="${e.id}">
        <div class="icon">🦞</div>
        <div class="body">
          <div class="t">${esc(e.desc)}</div>
          <div class="s">${esc(memberName(p, e.payerId))} 付款 ・ ${e.splitType === 'custom' ? '自訂' : '均分'}給 ${e.participants.length} 人 ・ ${e.date}</div>
        </div>
        <div class="amt">
          <div class="a">${fmt(e.amount)} ${e.currency}</div>
          ${isB ? '' : `<div class="c">≈ ${fmt(base)} ${p.baseCurrency}</div>`}
        </div>
        ${locked ? '' : `<button class="edit" data-editexp="${e.id}" title="編輯">🪸</button><button class="del" data-delexp="${e.id}" title="刪除">🗑️</button>`}
        <span class="chev">▶</span>
      </div>
      ${detail}
    </div>`;
  }).join('');

  /* balances */
  const bal = balances(p);
  const maxAbs = Math.max(1, ...Object.values(bal).map(Math.abs));
  const balCur = (p.balDisplayCur && p.balDisplayCur !== p.baseCurrency) ? p.balDisplayCur : '';
  const balRate = balCur ? getGlobalRate(balCur, p.baseCurrency) : null;   // 1 balCur = ? base
  const balHtml = p.members.map(m => {
    const v = Math.round(bal[m.id] * 100) / 100;
    const pct = Math.min(100, Math.abs(v) / maxAbs * 100);
    const cls = v > 0.005 ? 'pos' : v < -0.005 ? 'neg' : 'zero';
    const sign = v > 0.005 ? '+' : '';
    let sub = '';
    if (balCur) {
      sub = balRate
        ? `<div class="v-sub">≈ ${sign}${fmt(v / balRate)} ${balCur}</div>`
        : `<div class="v-sub">（${balCur} 無匯率）</div>`;
    }
    return `
    <div class="bal">
      <span class="nm">${esc(m.name)}</span>
      <div class="bar-wrap">
        <div class="bar-half">${v < -0.005 ? `<div class="bar" style="right:0; width:${pct}%; background:linear-gradient(90deg,#EFB6B2,#E08E8A)"></div>` : ''}</div>
        <div class="bar-half">${v > 0.005 ? `<div class="bar" style="left:0; width:${pct}%; background:linear-gradient(90deg,#B9CBA4,#A3B98C)"></div>` : ''}</div>
      </div>
      <span class="v ${cls}">${sign}${fmt(v)} ${p.baseCurrency}${sub}</span>
    </div>`;
  }).join('');

  /* settlements */
  const st = settlements(p);
  const settled = p.settledPayments || [];
  const stHtml = st.length === 0
    ? `<div class="allclear"><span class="big">🎉</span>${
        settled.length ? '所有款項都結清了，完美收場！' :
        p.expenses.length ? '大家都互不相欠，太完美了！' : '還沒有帳目，記完帳這裡會告訴你誰該給誰錢'}</div>`
    : st.map(s => `
      <div class="settle">
        <span>${esc(memberName(p, s.from))}</span>
        <span class="arrow">━➤</span>
        <span>${esc(memberName(p, s.to))}</span>
        <span class="money">${fmt(s.amount)} ${p.baseCurrency}</span>
        <button class="btn btn-butter btn-sm" data-settle-from="${s.from}" data-settle-to="${s.to}" data-settle-amt="${s.amount}">✓ 已結清</button>
      </div>`).join('');
  const settledHtml = !settled.length ? '' : `
    <div class="settled-head">✅ 已結清紀錄（${settled.length} 筆）</div>
    ${settled.map(sp => `
      <div class="settle done">
        <span>${esc(memberName(p, sp.from))}</span>
        <span class="arrow">━➤</span>
        <span>${esc(memberName(p, sp.to))}</span>
        <span class="done-date">${sp.date}</span>
        <span class="money">${fmt(sp.amount)} ${p.baseCurrency}</span>
        <button class="btn btn-ghost btn-sm" data-unsettle="${sp.id}" title="取消這筆結清">↩</button>
      </div>`).join('')}`;

  return `
  <div class="topbar">
    <button class="btn btn-ghost btn-sm" id="btnBack">← 回計劃列表</button>
    <h1>${normalizePlanIcon(p.emoji, p.id)} ${esc(p.name)}
      <span class="badge ${locked ? 'badge-closed' : 'badge-open'}">${locked ? '🌙 已結案' : '🌱 進行中'}</span>
    </h1>
    ${cloudEnabled() ? '<span class="sync-badge" id="syncBadge">已連線 ☁️</span>' : ''}
    <button class="btn btn-ghost btn-sm" id="btnShare" title="複製分享連結">🪼 分享</button>
    ${locked ? '' : `<button class="btn btn-primary btn-sm" id="btnClose">🌙 結案</button>`}
  </div>
  ${locked ? `<div class="closed-note">🌙 這個計劃已於 ${p.closedAt || ''} 結案，帳目只能查看、不能再更動囉。</div>` : ''}

  <div class="card">
    <h2><span class="dot">🐬</span>成員（${p.members.length}）</h2>
    <div class="chips">${chips || `<span class="empty" style="padding:4px">還沒有成員</span>`}</div>
    ${locked ? '' : `
    <div class="frow" style="margin-top:14px">
      <input type="text" id="newMemberName" placeholder="輸入名字，例：小熊" maxlength="12" style="flex:3">
      <button class="btn btn-butter" id="btnAddMember" style="flex:1; justify-content:center">＋ 新增成員</button>
    </div>`}
  </div>

  ${formHtml}

  <div class="card">
    <h2><span class="dot">🐠</span>帳目（${p.expenses.length}）<span style="margin-left:auto; font-size:13px; color:var(--mocha)">總計 ${fmt(planTotal(p))} ${p.baseCurrency}</span></h2>
    ${expList || `<div class="empty"><span class="big">✨</span>還沒有帳目</div>`}
  </div>

  <div class="card">
    <h2><span class="dot">🌅</span>每人餘額
      <span class="meta-sub" style="display:flex; align-items:center; gap:8px">＋該收回／－該付出
        <select id="balCur" class="cur-mini" title="加顯示換算幣別">
          <option value="">只顯示 ${p.baseCurrency}</option>
          ${CURRENCIES.filter(([c]) => c !== p.baseCurrency).map(([c, l]) => `<option value="${c}" ${c === balCur ? 'selected' : ''}>換算 ${l}</option>`).join('')}
        </select>
      </span>
    </h2>
    ${p.members.length ? balHtml : `<div class="empty">先新增成員</div>`}
  </div>

  <div class="card">
    <h2><span class="dot">⛵</span>結算方案（最少轉帳次數）</h2>
    ${stHtml}
    ${settledHtml}
  </div>
  <div class="footer">讓海風輕輕吹過，也把每一筆帳算清 <span class="heart">♥</span></div>`;
}

function rateHintText(p) {
  const a = parseFloat(expForm.amount) || 0;
  const r = parseFloat(expForm.rate) || 0;
  const g = getGlobalRate(expForm.currency, p.baseCurrency);
  let src;
  if (g === null) src = '尚未維護這個幣別，請手動輸入匯率';
  else if (r && Math.abs(r - g) / g < 1e-6) src = '已帶入你維護的匯率';
  else if (r) src = `已手動覆寫（維護值 ${fmtRate(g)}）`;
  else src = `你維護的匯率是 ${fmtRate(g)}`;
  const conv = (a && r) ? `・${fmt(a)} ${expForm.currency} ≈ ${fmt(a * r)} ${p.baseCurrency}` : '';
  return `💡 ${src}${conv}`;
}

function customSumHint(p) {
  const amount = parseFloat(expForm.amount) || 0;
  const sum = expForm.participants.reduce((s, id) => s + (parseFloat(expForm.customAmounts[id]) || 0), 0);
  const diff = Math.round((amount - sum) * 100) / 100;
  if (!amount) return `<div class="hint">先在上面填總金額，再分配每個人的份</div>`;
  if (Math.abs(diff) <= 0.01) return `<div class="hint">✅ 分配剛剛好，總計 ${fmt(sum)} ${expForm.currency}</div>`;
  return `<div class="hint bad">${diff > 0 ? `還有 ${fmt(diff)} 沒分完` : `多分了 ${fmt(-diff)}`}（目前 ${fmt(sum)} / ${fmt(amount)} ${expForm.currency}）</div>`;
}

/* ───────────────────────── events ───────────────────────── */
function syncExpFormFromDOM() {
  const g = id => document.getElementById(id);
  if (!g('expDesc')) return;
  expForm.desc = g('expDesc').value;
  expForm.amount = g('expAmount').value;
  expForm.currency = g('expCur').value;
  expForm.rate = g('expRate').disabled ? '1' : g('expRate').value;
  expForm.payerId = g('expPayer').value;
  expForm.date = g('expDate')?.value || today();
  expForm.splitType = document.querySelector('input[name="splitType"]:checked').value;
  expForm.participants = [...document.querySelectorAll('[data-part]')].filter(c => c.checked).map(c => c.dataset.part);
  document.querySelectorAll('[data-custom]').forEach(inp => { expForm.customAmounts[inp.dataset.custom] = inp.value; });
}

function bindEvents() {
  const on = (id, fn) => { const el = document.getElementById(id); if (el) el.onclick = fn; };

  /* rates */
  on('goRates', () => { route = { view: 'rates', back: { view: 'home' } }; render(); window.scrollTo(0, 0); });
  on('goRatesFromPlan', () => { syncExpFormFromDOM(); route = { view: 'rates', back: { view: 'plan', id: route.id } }; render(); window.scrollTo(0, 0); });
  on('btnRatesBack', () => { route = route.back || { view: 'home' }; render(); window.scrollTo(0, 0); });
  on('btnFetchRates', async () => {
    const btn = document.getElementById('btnFetchRates');
    btn.disabled = true; btn.textContent = '🌐 抓取中…';
    try {
      const { values, source } = await fetchExternalRates(state.rates.anchor);
      state.rates.values = { ...state.rates.values, ...values };
      state.rates.source = source;
      state.rates.updatedAt = nowStr();
      save({ rates: true }); render();
      toast('最新匯率抓好了 🌐');
    } catch {
      btn.disabled = false; btn.textContent = '🌐 抓取最新匯率';
      toast('抓取失敗，請檢查網路後再試，或直接手動輸入');
    }
  });
  const anchorSel = document.getElementById('anchorSel');
  if (anchorSel) anchorSel.onchange = () => {
    const newA = anchorSel.value;
    const old = state.rates.values;
    const pivot = old[newA];
    if (pivot > 0) {
      const nv = {};
      for (const [k, v] of Object.entries(old)) if (v > 0) nv[k] = v / pivot;
      nv[newA] = 1;
      state.rates.values = nv;
    } else {
      state.rates.values = { [newA]: 1 };
      toast('新基準幣別沒有既有匯率可換算，表格已重設');
    }
    state.rates.anchor = newA;
    state.rates.updatedAt = nowStr();
    save({ rates: true }); render();
  };
  document.querySelectorAll('[data-rate]').forEach(inp => inp.oninput = () => {
    const code = inp.dataset.rate;
    const v = parseFloat(inp.value);
    if (v > 0) state.rates.values[code] = v;
    else delete state.rates.values[code];
    state.rates.source = '✍️ 手動維護';
    state.rates.updatedAt = nowStr();
    save({ rates: true });
    const meta = document.getElementById('ratesMeta');
    if (meta) meta.textContent = `${state.rates.source}・${state.rates.updatedAt}`;
  });

  /* cloud */
  on('btnCloudRefresh', async () => {
    setSyncBadge('busy', '刷新中…');
    try {
      await cloudBootstrap();
      setSyncBadge('ok', '已更新 🔄');
      render();
      toast('已從試算表刷新');
    } catch (e) {
      setSyncBadge('err', '刷新失敗');
      toast('刷新失敗');
    }
  });

  /* home */
  on('btnAddPlan', addPlan);
  const npn = document.getElementById('newPlanName');
  if (npn) npn.onkeydown = e => { if (e.key === 'Enter') addPlan(); };
  document.querySelectorAll('[data-delplan]').forEach(b => b.onclick = e => { e.stopPropagation(); deletePlan(b.dataset.delplan); });
  document.querySelectorAll('[data-open]').forEach(c => c.onclick = () => { route = { view: 'plan', id: c.dataset.open }; expForm = null; editingExpenseId = null; expandedExps.clear(); render(); window.scrollTo(0, 0); });

  on('btnShare', async () => {
    const url = planShareUrl(route.id);
    try {
      await navigator.clipboard.writeText(url);
      toast('分享連結已複製 📋');
    } catch {
      prompt('複製這個連結分享給朋友：', url);
    }
  });

  /* plan */
  on('btnBack', () => { route = { view: 'home' }; expForm = null; editingExpenseId = null; expandedExps.clear(); render(); window.scrollTo(0, 0); });
  on('btnClose', () => closePlan(route.id));
  on('btnAddMember', () => { syncExpFormFromDOM(); addMember(route.id); });
  const nmn = document.getElementById('newMemberName');
  if (nmn) nmn.onkeydown = e => { if (e.key === 'Enter') { syncExpFormFromDOM(); addMember(route.id); } };
  document.querySelectorAll('[data-delmember]').forEach(x => x.onclick = () => { syncExpFormFromDOM(); removeMember(route.id, x.dataset.delmember); });
  document.querySelectorAll('[data-editexp]').forEach(b => b.onclick = e => { e.stopPropagation(); syncExpFormFromDOM(); editExpense(route.id, b.dataset.editexp); });
  document.querySelectorAll('[data-delexp]').forEach(b => b.onclick = e => { e.stopPropagation(); deleteExpense(route.id, b.dataset.delexp); });
  document.querySelectorAll('[data-togexp]').forEach(row => row.onclick = () => {
    syncExpFormFromDOM();
    const id = row.dataset.togexp;
    expandedExps.has(id) ? expandedExps.delete(id) : expandedExps.add(id);
    render();
  });
  on('btnAddExp', () => { syncExpFormFromDOM(); submitExpense(route.id); });
  on('btnCancelEdit', () => cancelEditExpense(route.id));
  document.querySelectorAll('[data-settle-from]').forEach(b => b.onclick = () => {
    if (document.getElementById('expDesc')) syncExpFormFromDOM();
    markSettled(route.id, b.dataset.settleFrom, b.dataset.settleTo, parseFloat(b.dataset.settleAmt));
  });
  document.querySelectorAll('[data-unsettle]').forEach(b => b.onclick = () => {
    if (document.getElementById('expDesc')) syncExpFormFromDOM();
    undoSettled(route.id, b.dataset.unsettle);
  });
  const balCurSel = document.getElementById('balCur');
  if (balCurSel) balCurSel.onchange = () => {
    if (document.getElementById('expDesc')) syncExpFormFromDOM();
    const p = getPlan(route.id);
    p.balDisplayCur = balCurSel.value;
    save({ planId: route.id }); render();
  };
  on('btnPickAll', () => {
    syncExpFormFromDOM();
    const p = getPlan(route.id);
    expForm.participants = p.members.map(m => m.id);
    render();
  });

  /* re-render triggers that change the form's shape */
  const cur = document.getElementById('expCur');
  if (cur) cur.onchange = () => {
    syncExpFormFromDOM();
    const p = getPlan(route.id);
    if (expForm.currency === p.baseCurrency) expForm.rate = '1';
    else {
      const g = getGlobalRate(expForm.currency, p.baseCurrency);
      expForm.rate = g !== null ? fmtRate(g) : '';
    }
    render();
  };
  document.querySelectorAll('input[name="splitType"]').forEach(r => r.onchange = () => { syncExpFormFromDOM(); render(); });
  document.querySelectorAll('[data-part]').forEach(c => c.onchange = () => {
    if (expForm.splitType === 'custom' || document.querySelector('input[name="splitType"]:checked').value === 'custom') { syncExpFormFromDOM(); render(); }
    else syncExpFormFromDOM();
  });
  document.querySelectorAll('[data-custom]').forEach(inp => inp.oninput = () => {
    syncExpFormFromDOM();
    const hintWrap = inp.closest('.custom-splits');
    const old = hintWrap.querySelector('.hint');
    if (old) old.outerHTML = customSumHint(getPlan(route.id));
  });
  const refreshHints = () => {
    syncExpFormFromDOM();
    const p = getPlan(route.id);
    const hintWrap = document.querySelector('.custom-splits');
    if (hintWrap) { const old = hintWrap.querySelector('.hint'); if (old) old.outerHTML = customSumHint(p); }
    const rh = document.getElementById('rateHintText');
    if (rh) rh.textContent = rateHintText(p);
  };
  const amt = document.getElementById('expAmount');
  if (amt) amt.oninput = refreshHints;
  const rateInp = document.getElementById('expRate');
  if (rateInp) rateInp.oninput = refreshHints;
}

init();
</script>
</body>
</html>
